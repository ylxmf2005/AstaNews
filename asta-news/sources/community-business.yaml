# 社区热度 / X / 中英文媒体 / 商业产品 / GitHub trending
sources:
  - id: hn-frontpage
    name: Hacker News Front Page
    layers: [product, devtool, business]
    type: json
    parser: hn_algolia
    url: "https://hn.algolia.com/api/v1/search?tags=front_page&hitsPerPage=30"
    priority: P0
    freq: daily
    verified: 2026-06-12
    notes: "首页≈已被 HN 社区策展；AI 相关性在策展层判断；points/comments 进 extra"

  - id: smol-ai-news
    name: Smol AI News (AINews)
    layers: [model, product, agent]
    type: rss
    url: https://news.smol.ai/rss.xml
    priority: P0
    freq: daily
    verified: 2026-06-12
    notes: "每日'AI Twitter/Reddit/Discord 在聊什么'的机器+人工综述——X 信号的免费冗余兜底；工作日刊"

  - id: techcrunch-ai
    name: TechCrunch AI
    layers: [business, product]
    type: rss
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    priority: P0
    freq: daily
    verified: 2026-06-12
    notes: "免费融资/产品新闻 firehose，全文 feed；日 5-15 条，策展层收窄"

  - id: tldr-ai
    name: TLDR AI
    layers: [model, product, business]
    type: rss
    url: https://tldr.tech/api/rss/ai
    priority: P1
    freq: daily
    verified: 2026-06-13
    notes: "日更 AI 新闻简报，已策展过的链接集合，信噪比高"

  - id: bens-bites
    name: Ben's Bites
    layers: [product, business, agent]
    type: rss
    url: https://www.bensbites.com/feed
    priority: P2
    freq: daily
    verified: 2026-06-13

  - id: one-useful-thing
    name: One Useful Thing (Ethan Mollick)
    layers: [product, devtool]
    type: rss
    url: https://www.oneusefulthing.org/feed
    priority: P2
    freq: weekly
    verified: 2026-06-13
    notes: "实用 AI 应用视角，产品/使用方法"

  - id: the-decoder
    name: The Decoder
    layers: [model, product, business]
    type: rss
    url: https://the-decoder.com/feed/
    priority: P1
    freq: daily
    verified: 2026-06-13
    notes: "AI 新闻媒体，覆盖发布/产品/研究，写法易懂，可作橘鸦式日报参考"

  - id: marktechpost
    name: MarkTechPost
    layers: [model, agent]
    type: rss
    url: https://www.marktechpost.com/feed/
    priority: P2
    freq: daily
    verified: 2026-06-13
    notes: "模型/方法新闻聚合，量大，策展层收窄；可补抓新发布"

  - id: qbitai
    name: 量子位 (RSSHub)
    layers: [business, product, model]
    type: rsshub
    url: /qbitai/category/资讯
    priority: P1
    freq: daily
    verified: 2026-06-12
    notes: "中文 AI 媒体；机器之心已无可用源（路由移除+原生 feed 死），量子位为替代"

  - id: leiphone
    name: 雷峰网 (RSSHub)
    layers: [business, product, model]
    type: rsshub
    url: /leiphone
    priority: P1
    freq: daily
    verified: 2026-06-13
    notes: "中文 AI/科技媒体，10 条/页；与量子位互补"

  - id: kr36-newsflash
    name: 36氪快讯 (RSSHub)
    layers: [business, product]
    type: rsshub
    url: /36kr/newsflashes
    priority: P2
    freq: daily
    verified: 2026-06-13
    notes: "中文商业/融资快讯 firehose（橘鸦式商业视角）；非纯 AI，策展层滤 AI 相关"

  - id: huxiu
    name: 虎嗅 (RSSHub)
    layers: [business, product]
    type: rsshub
    url: /huxiu/article
    priority: P2
    freq: daily
    verified: 2026-06-13
    notes: "中文科技商业评论；非纯 AI，策展层滤 AI 相关"

  - id: oss-insight-trends
    name: OSS Insight Trending Repos
    layers: [devtool, agent, serving]
    type: json
    parser: oss_insight
    url: "https://api.ossinsight.io/v1/trends/repos/?period=past_24_hours&language=All"
    priority: P0
    freq: daily
    verified: 2026-06-12
    notes: "GitHub Trending 的结构化替代（官方无 API）；stars/forks 进 extra；'某开源项目值得关注的更新'主信号之一"

  - id: github-trending-rss
    name: GitHubTrendingRSS (备用)
    layers: [devtool]
    type: rss
    url: https://mshibanami.github.io/GitHubTrendingRSS/daily/all.xml
    priority: P2
    enabled: false
    freq: daily
    verified: 2026-06-12
    notes: "oss-insight 失效时的备用镜像（GitHub Pages 日构建）"

  - id: rsshub-github-trending
    name: GitHub Trending (RSSHub)
    layers: [devtool]
    type: rsshub
    url: /github/trending/daily/any
    priority: P2
    enabled: false
    freq: daily
    verified: 2026-06-12
    notes: "PAT 配在 RSSHub 容器 .env 的 GITHUB_ACCESS_TOKEN（GraphQL，无 scope 即可），抓取器侧无需 env；与 oss-insight 二选一"

  # —— X/Twitter：经自部署 RSSHub + 容器内 TWITTER_AUTH_TOKEN（cookie）。实测可用。
  # 当前用 per-user 路由（无需建 List，开箱即用）。若改用一个 X List 更省请求：
  # 启用下方 x-ai-list（填 ASTA_X_LIST_ID）并把这些 per-user 源 enabled:false。
  - id: x-karpathy
    name: X · @karpathy
    layers: [model, devtool]
    type: rsshub
    url: /twitter/user/karpathy
    priority: P1
    freq: daily
    verified: 2026-06-13
    notes: "需 RSSHub + 容器内 auth_token（已配）；策展时滤掉纯 RT"
  - id: x-_jasonwei
    name: X · @_jasonwei
    layers: [model, post-training]
    type: rsshub
    url: /twitter/user/_jasonwei
    priority: P1
    freq: daily
    verified: 2026-06-13
  - id: x-_akhaliq
