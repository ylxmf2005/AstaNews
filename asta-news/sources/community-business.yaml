  - id: x-ai-list
    name: X/Twitter AI List (RSSHub)
    layers: [model, agent, product]
    type: rsshub
    url: /twitter/list/${ASTA_X_LIST_ID}
    priority: P0
    requires_env: [ASTA_X_LIST_ID]
    enabled: false
    freq: daily
    verified: 2026-06-12
    notes: "可选：建一个 X List 收所有 KOL，一次请求拿全（比上面 per-user 省请求）。填 ASTA_X_LIST_ID 后 enable，并把 x-* per-user 源 disable。"

  - id: last-week-in-ai
    name: Last Week in AI
    layers: [product, business]
    type: rss
    url: https://lastweekin.ai/feed
